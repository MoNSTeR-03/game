<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ryoko • The Universe Within You ✨</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none; /* makes it feel like a magical canvas */
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #0b0118, #000000);
      overflow: hidden;
      font-family: 'Segoe UI', 'Poppins', 'Quicksand', system-ui, -apple-system, 'Pacifico', cursive;
      touch-action: manipulation;
      position: relative;
    }

    /* Floating thought bubbles — dreamlike */
    .thought {
      position: absolute;
      background: rgba(255, 220, 250, 0.2);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 100, 200, 0.6);
      border-radius: 60px;
      padding: 10px 20px;
      font-size: 1rem;
      font-weight: 600;
      color: #ffe0f5;
      text-shadow: 0 0 6px #ff44cc;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      letter-spacing: 0.5px;
      font-family: 'Quicksand', sans-serif;
      z-index: 20;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      white-space: nowrap;
    }

    .thought:hover {
      transform: scale(1.08);
      background: rgba(255, 120, 210, 0.5);
      border-color: #ff99ee;
      box-shadow: 0 0 20px #ff66cc;
    }

    .thought.activated {
      background: #c084fc;
      border-color: #f0abfc;
      box-shadow: 0 0 28px #d946ef;
      color: white;
      text-decoration: line-through;
      opacity: 0.7;
      cursor: default;
      transform: scale(0.98);
    }

    /* message popup - NOW STAYS LONGER (6 seconds) & larger readable */
    #msg {
      position: fixed;
      bottom: 28%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(24px);
      padding: 16px 32px;
      border-radius: 80px;
      font-size: 1.3rem;
      font-weight: 600;
      color: #fff0fc;
      text-align: center;
      border: 1px solid #ffa6e0;
      white-space: normal;
      max-width: 85vw;
      width: auto;
      word-break: break-word;
      z-index: 200;
      font-family: 'Quicksand', monospace;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      transition: opacity 0.4s ease;
      opacity: 0;
      pointer-events: none;
      line-height: 1.4;
    }

    /* characters (chibi style) */
    .char {
      position: absolute;
      bottom: 8%;
      font-size: 85px;
      transition: all 2.2s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      filter: drop-shadow(0 0 12px #ffa3d7);
      z-index: 15;
      text-shadow: 0 0 8px #ff66bb;
    }

    #ahmad {
      left: 8%;
      transform: scale(1);
    }

    #ryoko {
      right: 8%;
      transform: scale(1);
    }

    /* final confession zone */
    #final {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85%;
      max-width: 580px;
      background: rgba(10, 0, 25, 0.92);
      backdrop-filter: blur(20px);
      border-radius: 64px;
      padding: 32px 24px;
      text-align: center;
      border: 2px solid rgba(255, 100, 200, 0.7);
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 50px rgba(218, 112, 214, 0.3);
      opacity: 0;
      transition: opacity 1.2s ease;
      z-index: 300;
      pointer-events: none;
      color: #fff5fd;
      font-family: 'Quicksand', 'Segoe UI', sans-serif;
    }

    #final h2 {
      font-size: 3rem;
      background: linear-gradient(135deg, #ffb3f0, #e08eff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    #final p {
      font-size: 1.1rem;
      line-height: 1.5;
      margin: 12px 0;
      font-weight: 400;
    }

    #final .special-quote {
      font-style: italic;
      border-top: 1px dashed #ff9ef5;
      border-bottom: 1px dashed #ff9ef5;
      padding: 12px;
      margin: 15px 0;
      font-size: 1rem;
    }

    #final h3 {
      margin-top: 18px;
      font-size: 1.7rem;
      font-weight: 600;
      color: #ffccf0;
    }

    /* floating particles with heart */
    .particle {
      position: absolute;
      font-size: 1.4rem;
      pointer-events: none;
      animation: floatUp 3.5s ease-out forwards;
      z-index: 100;
      filter: drop-shadow(0 0 4px #ff88dd);
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(0.6);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-180px) scale(1.3);
        opacity: 0;
      }
    }

    /* sparkle effect */
    .sparkle {
      position: absolute;
      width: 6px;
      height: 6px;
      background: #ffb7f0;
      border-radius: 50%;
      box-shadow: 0 0 12px #ff44dd;
      animation: twinkle 1.2s infinite alternate;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes twinkle {
      0% { opacity: 0.2; transform: scale(0.8);}
      100% { opacity: 1; transform: scale(1.4);}
    }

    /* counter & instruction */
    .counter-info {
      position: fixed;
      bottom: 15px;
      left: 20px;
      font-size: 13px;
      color: #ffccf0;
      background: rgba(0,0,0,0.55);
      padding: 6px 14px;
      border-radius: 50px;
      font-family: monospace;
      z-index: 50;
      backdrop-filter: blur(6px);
      pointer-events: none;
      font-weight: 500;
    }

    /* instruction banner at start */
    .instruction-banner {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(16px);
      padding: 12px 24px;
      border-radius: 60px;
      color: #ffdcf5;
      font-size: 1rem;
      font-weight: bold;
      border: 1px solid #ff99ee;
      z-index: 150;
      white-space: nowrap;
      font-family: 'Quicksand', sans-serif;
      letter-spacing: 1px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      pointer-events: none;
      animation: gentlePulse 2s infinite;
    }

    @keyframes gentlePulse {
      0% { opacity: 0.8; box-shadow: 0 0 0 0 rgba(255, 100, 200, 0.4);}
      100% { opacity: 1; box-shadow: 0 0 0 8px rgba(255, 100, 200, 0);}
    }

    @media (max-width: 600px) {
      .thought { font-size: 0.75rem; padding: 6px 14px; white-space: nowrap; }
      .char { font-size: 65px; bottom: 5%; }
      #msg { font-size: 1rem; padding: 12px 20px; bottom: 25%; max-width: 90vw; white-space: normal;}
      .instruction-banner { font-size: 0.75rem; padding: 8px 18px; white-space: nowrap; top: 12px;}
      #final p { font-size: 0.9rem;}
      #final h2 { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div id="msg"></div>
<div class="counter-info" id="counterDisplay">✨ Ryoko, touch my thoughts ✨</div>
<div class="instruction-banner" id="instructionMsg">💜 Ryoko, touch each floating thought → discover what hides inside my heart 💜</div>

<div id="ahmad" class="char">🧸💫</div>
<div id="ryoko" class="char">🌸🦋</div>

<div id="final"></div>

<audio id="bgMusic" loop preload="auto">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
  // ========== DEEPER THOUGHTS + LONGER MESSAGE DISPLAY ==========
  const thoughtsList = [
    { word: "✨ tu luz ✨", message: "Ryoko, cuando sonríes, hasta la luna se queda en silencio para mirarte 💜" },
    { word: "🌙 tus ojos", message: "Tus ojos son galaxias donde quiero perderme cada noche. Dos lunas que guían mi alma." },
    { word: "🌸 tu risa", message: "Tu risa es el sonido más puro, me hace flotar entre nubes de algodón 🌸💜" },
    { word: "💜 tu alma", message: "Siento que te he conocido en mil vidas, y en cada una te elijo de nuevo." },
    { word: "🍃 tu cabello", message: "Cuando el viento acaricia tu cabello, el universo escribe poesía." },
    { word: "⭐ tu voz", message: "Tu voz me sana, me calma, es mi melodía favorita, Ryoko." },
    { word: "🌊 miedo", message: "Antes temía al vacío... luego llegaste tú y lo llenaste de color." },
    { word: "🕯️ soledad", message: "Contigo aprendí que la soledad era solo el eco esperando tu nombre." },
    { word: "💭 dudas", message: "Cada duda desaparece cuando veo tu cara. Eres mi certeza más hermosa." },
    { word: "🌌 oscuridad", message: "En mis noches más oscuras, tus recuerdos son estrellas fugaces." },
    { word: "🫂 cansancio", message: "Un solo abrazo tuyo y el cansancio se vuelve brisa." },
    { word: "🌧️ tristeza", message: "Tú transformas mi lluvia en arcoíris. Eres magia, Ryoko." },
    { word: "💌 silencio", message: "Tu silencio también es poesía, porque sé que late por mí." },
    { word: "💎 vacío", message: "Antes había un hueco, ahora solo hay 'Ryoko' escrito en cada rincón." },
    { word: "❄️ frío", message: "Tu amor es el fuego que nunca se apaga, me abriga desde adentro." },
    { word: "🧭 perdido", message: "Eres mi brújula en este caos, gracias por encontrarme." },
    { word: "🦋 tu sonrisa", message: "Tu sonrisa merece un lugar en el museo de las cosas eternas." },
    { word: "💜 tus manos", message: "Tus manos sostienen mi mundo sin saberlo." },
    { word: "📖 nuestros días", message: "Cada día a tu lado es un capítulo que nunca quiero terminar." },
    { word: "🏡 futuro", message: "Contigo quiero construir un hogar lleno de risas y tardes lentas." },
    { word: "✈️ viajes", message: "Quiero ver cada atardecer del mundo, pero solo si estás a mi lado." },
    { word: "💖 amor eterno", message: "Mi corazón ahora late en tu idioma. Ahmad & Ryoko 💜" },
    { word: "🌹 destino", message: "El destino nos escribió en las estrellas. Y yo lo firmo con mi alma." },
    { word: "🕊️ paz", message: "Tu presencia es mi templo, mi refugio, mi oración favorita." },
    { word: "💋 abrazo", message: "Un abrazo tuyo vale más que mil palabras bonitas. Quiero perderme en tus brazos." },
    { word: "🍬 momentos", message: "Cada pequeño instante contigo es mi tesoro más valioso, Ryoko." }
  ];

  let activatedCount = 0;
  let endingTriggered = false;
  const REQUIRED_CLICKS = 16;   // unlock surprise after 16 heartfelt clicks
  let thoughtElements = [];

  // ========== MESSAGE WITH LONGER DURATION (6 seconds) ==========
  let activeMsgTimeout = null;
  function showFloatingMessage(text) {
    const msgDiv = document.getElementById("msg");
    // clear previous timeout to extend if new message appears
    if (activeMsgTimeout) clearTimeout(activeMsgTimeout);
    msgDiv.innerText = text;
    msgDiv.style.opacity = "1";
    // message stays for 6 seconds — enough to read comfortably
    activeMsgTimeout = setTimeout(() => {
      if (msgDiv) msgDiv.style.opacity = "0";
      activeMsgTimeout = null;
    }, 6000);
  }

  // update counter UI with cute text
  function updateCounterUI() {
    const counterDiv = document.getElementById("counterDisplay");
    if (activatedCount >= REQUIRED_CLICKS) {
      counterDiv.innerHTML = "💜 Your love unlocked the secret 💜";
      counterDiv.style.color = "#ffd966";
    } else {
      counterDiv.innerHTML = `✨ tapping my soul... ${activatedCount}/${REQUIRED_CLICKS} ✨`;
    }
  }

  // create sparkle background (continuous soft glitter)
  function createSparkleField() {
    for (let i = 0; i < 65; i++) {
      let star = document.createElement("div");
      star.classList.add("sparkle");
      star.style.left = Math.random() * 100 + "%";
      star.style.top = Math.random() * 100 + "%";
      star.style.animationDuration = 0.8 + Math.random() * 1.8 + "s";
      star.style.animationDelay = Math.random() * 4 + "s";
      document.body.appendChild(star);
    }
  }
  createSparkleField();

  // mini heart burst at click position
  function burstMiniHearts(x, y) {
    for (let i = 0; i < 8; i++) {
      let heart = document.createElement("div");
      heart.innerText = ["💜", "🌸", "✨", "🦋", "💫", "🌙"][Math.floor(Math.random() * 6)];
      heart.classList.add("particle");
      heart.style.left = (x - 25 + Math.random() * 50) + "px";
      heart.style.top = (y - 25 + Math.random() * 50) + "px";
      heart.style.fontSize = "20px";
      document.body.appendChild(heart);
      setTimeout(() => heart.remove(), 2200);
    }
  }

  // Handle thought click
  function onThoughtClick(thoughtDiv, msgText, event) {
    if (endingTriggered) return;
    if (thoughtDiv.classList.contains("activated")) return;

    thoughtDiv.classList.add("activated");
    activatedCount++;
    updateCounterUI();
    showFloatingMessage(msgText);

    const rect = thoughtDiv.getBoundingClientRect();
    burstMiniHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);

    if (navigator.vibrate) navigator.vibrate(50);

    if (activatedCount >= REQUIRED_CLICKS && !endingTriggered) {
      startGrandFinale();
    }
  }

  // generate all thoughts on screen avoiding overlap
  function generateThoughts() {
    const fragment = document.createDocumentFragment();
    const usedPositions = [];

    thoughtsList.forEach((item, idx) => {
      const thoughtDiv = document.createElement("div");
      thoughtDiv.className = "thought";
      thoughtDiv.innerText = item.word;
      let leftPos, topPos;
      let attempts = 0;
      do {
        leftPos = 5 + Math.random() * 85; // vw
        topPos = 8 + Math.random() * 75;  // vh
        attempts++;
        if (attempts > 40) break;
      } while (usedPositions.some(pos => Math.abs(pos.left - leftPos) < 13 && Math.abs(pos.top - topPos) < 10));
      usedPositions.push({ left: leftPos, top: topPos });
      thoughtDiv.style.left = leftPos + "vw";
      thoughtDiv.style.top = topPos + "vh";
      
      const messageText = item.message;
      thoughtDiv.addEventListener("click", (e) => {
        e.stopPropagation();
        onThoughtClick(thoughtDiv, messageText, e);
      });
      fragment.appendChild(thoughtDiv);
      thoughtElements.push(thoughtDiv);
    });
    document.body.appendChild(fragment);
  }

  // GRAND FINALE: romantic convergence
  function startGrandFinale() {
    if (endingTriggered) return;
    endingTriggered = true;

    // remove instruction banner with fade out
    const instrBanner = document.getElementById("instructionMsg");
    if (instrBanner) {
      instrBanner.style.transition = "opacity 1s";
      instrBanner.style.opacity = "0";
      setTimeout(() => instrBanner.remove(), 1000);
    }

    // gently fade unclicked thoughts (they're not needed)
    thoughtElements.forEach(el => {
      if (!el.classList.contains("activated")) {
        el.style.transition = "opacity 0.6s";
        el.style.opacity = "0";
        setTimeout(() => el.remove(), 700);
      }
    });

    // Play romantic music
    const audio = document.getElementById("bgMusic");
    audio.volume = 0.45;
    audio.play().catch(e => console.log("audio autoplay blocked", e));
    
    const ahmadChar = document.getElementById("ahmad");
    const ryokoChar = document.getElementById("ryoko");

    ahmadChar.style.transition = "all 2.2s cubic-bezier(0.2, 0.9, 0.4, 1.2)";
    ryokoChar.style.transition = "all 2.2s cubic-bezier(0.2, 0.9, 0.4, 1.2)";
    ahmadChar.style.left = "42%";
    ahmadChar.style.bottom = "22%";
    ryokoChar.style.right = "42%";
    ryokoChar.style.bottom = "22%";

    // After characters move, show final love letter
    setTimeout(() => {
      showFinalLoveDeclaration();
      createHeavyLoveRain();
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
    }, 2300);
  }

  function showFinalLoveDeclaration() {
    const finalDiv = document.getElementById("final");
    finalDiv.innerHTML = `
      <h2>✨ Ryoko ✨</h2>
      <p>No sabes cuánto brilla mi mundo desde que llegaste a mi vida.</p>
      <div class="special-quote">
        💜 “Tus ojos no solo miran, sanan. Tu risa no solo suena, florece. <br>
        Cada latido tuyo se sincroniza con mi alma. <br>
        Eres la protagonista de mis días, la musa de mis silencios.”
      </div>
      <p>Cuando veo tu cabello moverse con el viento,<br>
      cuando descubro un nuevo brillo en tu mirada,<br>
      sé que el universo conspiró para regalarme a su mejor creación.</p>
      <p>Gracias por ser mi calma, mi aventura, mi destino favorito.<br>
      <strong>Te amo más de lo que las palabras pueden abrazar.</strong></p>
      <p style="font-size:1.2rem;">Eres mi sueño hecho realidad, Ryoko. 🌙💜</p>
      <h3>💕 Ahmad 💕</h3>
      <p style="font-size:0.8rem; opacity:0.9;">✦ cada pensamiento tuyo vive en mi corazón para siempre ✦</p>
    `;
    finalDiv.style.opacity = "1";
    finalDiv.style.pointerEvents = "auto";

    // Extra sparkle explosion around final message
    for (let i = 0; i < 55; i++) {
      setTimeout(() => {
        const spark = document.createElement("div");
        spark.innerText = "💜";
        spark.classList.add("particle");
        spark.style.left = Math.random() * 100 + "%";
        spark.style.top = Math.random() * 80 + "%";
        spark.style.fontSize = "28px";
        document.body.appendChild(spark);
        setTimeout(() => spark.remove(), 2800);
      }, i * 60);
    }
  }

  function createHeavyLoveRain() {
    let rainInterval = setInterval(() => {
      if (!endingTriggered) return;
      const particle = document.createElement("div");
      const icons = ["💜", "🌸", "✨", "🦋", "🌙", "⭐", "💗", "🎀", "💖"];
      particle.innerText = icons[Math.floor(Math.random() * icons.length)];
      particle.classList.add("particle");
      particle.style.left = Math.random() * 100 + "%";
      particle.style.top = "-20px";
      particle.style.fontSize = "24px";
      particle.style.animationDuration = "2.8s";
      document.body.appendChild(particle);
      setTimeout(() => particle.remove(), 3000);
    }, 380);
    setTimeout(() => clearInterval(rainInterval), 14000);
  }

  // Whispering romantic messages after finale appears (optional)
  function addPostFinaleWhispers() {
    const whispers = [
      "Ryoko, eres mi poesía favorita.",
      "Cada estrella me recuerda a ti.",
      "Tus abrazos son mi lugar seguro.",
      "Mi mundo tiene sentido gracias a ti.",
      "Te llevo conmigo donde vaya."
    ];
    let idx = 0;
    const whisperInterval = setInterval(() => {
      if (!endingTriggered) {
        clearInterval(whisperInterval);
        return;
      }
      const whisperDiv = document.createElement("div");
      whisperDiv.innerText = whispers[idx % whispers.length];
      whisperDiv.style.position = "fixed";
      whisperDiv.style.bottom = "12%";
      whisperDiv.style.left = "50%";
      whisperDiv.style.transform = "translateX(-50%)";
      whisperDiv.style.backgroundColor = "rgba(0,0,0,0.6)";
      whisperDiv.style.backdropFilter = "blur(12px)";
      whisperDiv.style.padding = "8px 22px";
      whisperDiv.style.borderRadius = "50px";
      whisperDiv.style.color = "#ffdcf5";
      whisperDiv.style.fontSize = "14px";
      whisperDiv.style.zIndex = "250";
      whisperDiv.style.whiteSpace = "nowrap";
      whisperDiv.style.fontFamily = "monospace";
      whisperDiv.style.opacity = "0";
      whisperDiv.style.transition = "opacity 0.6s";
      document.body.appendChild(whisperDiv);
      setTimeout(() => { whisperDiv.style.opacity = "1"; }, 20);
      setTimeout(() => {
        whisperDiv.style.opacity = "0";
        setTimeout(() => whisperDiv.remove(), 800);
      }, 3800);
      idx++;
    }, 5200);
    setTimeout(() => clearInterval(whisperInterval), 32000);
  }

  // initial star dust for ambiance
  function initialStarDust() {
    for (let i = 0; i < 45; i++) {
      let dust = document.createElement("div");
      dust.innerText = "✦";
      dust.style.position = "absolute";
      dust.style.left = Math.random() * 100 + "%";
      dust.style.top = Math.random() * 100 + "%";
      dust.style.color = "#ffb3f0";
      dust.style.fontSize = "9px";
      dust.style.opacity = "0.3";
      dust.style.pointerEvents = "none";
      document.body.appendChild(dust);
    }
  }

  // hide instruction banner after 8 seconds but also keep as reminder - but we'll let it fade naturally on first click maybe? Better: keep visible until first click? we'll keep it but user sees.
  function fadeInstructionAfterDelay() {
    setTimeout(() => {
      const instr = document.getElementById("instructionMsg");
      if (instr && !endingTriggered) {
        instr.style.transition = "opacity 1.5s";
        instr.style.opacity = "0.6";
        // but not remove completely, because she might need reminder
      }
    }, 7000);
  }

  // Load event
  window.addEventListener("load", () => {
    generateThoughts();
    initialStarDust();
    updateCounterUI();
    fadeInstructionAfterDelay();
    // welcome message with longer duration to greet Ryoko
    setTimeout(() => {
      if (!endingTriggered) {
        showFloatingMessage("💜 Hola Ryoko... toca cada burbuja, descubrirás lo que siento por ti 💜");
      }
    }, 800);
    addPostFinaleWhispers(); // will only become active after finale but it's fine
  });

  // enable music on first interaction
  function enableMusicOnFirstTouch() {
    const audioEl = document.getElementById("bgMusic");
    if (audioEl.paused && !endingTriggered) {
      audioEl.play().catch(e=>{});
    }
    document.removeEventListener("click", enableMusicOnFirstTouch);
    document.removeEventListener("touchstart", enableMusicOnFirstTouch);
  }
  document.addEventListener("click", enableMusicOnFirstTouch);
  document.addEventListener("touchstart", enableMusicOnFirstTouch);
</script>
</body>
</html>
