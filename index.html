<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dentro de mi mente 💜</title>

<style>
body{
  margin:0;
  overflow:hidden;
  background: radial-gradient(circle at center, #0a0015, #000);
  font-family: Arial, sans-serif;
}

/* thoughts */
.thought{
  position:absolute;
  padding:10px 15px;
  background:#ff4fd8;
  color:white;
  border-radius:20px;
  font-size:14px;
  cursor:pointer;
  box-shadow:0 0 15px #ff4fd8;
  transition:0.3s;
}
.thought:hover{transform:scale(1.1);}

.activated{
  background:#a64dff;
  box-shadow:0 0 25px #a64dff;
}

/* message */
#msg{
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  color:#fff;
  font-size:18px;
  opacity:0;
  transition:0.5s;
}

/* characters */
.char{
  position:absolute;
  bottom:50px;
  font-size:50px;
  transition:3s;
}
#ahmad{left:10%;}
#ryoko{right:10%;}

/* final */
#final{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:#fff;
  text-align:center;
  opacity:0;
}

/* particles */
.particle{
  position:absolute;
  color:#ff4fd8;
  font-size:20px;
  animation:float 3s linear infinite;
}
@keyframes float{
  from{transform:translateY(0);opacity:1;}
  to{transform:translateY(-100px);opacity:0;}
}
</style>
</head>

<body>

<div id="msg"></div>

<div id="ahmad" class="char">🧑‍🦱</div>
<div id="ryoko" class="char">👩</div>

<div id="final"></div>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-love.mp3"></audio>

<script>

/* THOUGHTS + MESSAGES */
const thoughts = [
["miedo","Me hiciste fuerte para enfrentar mis miedos 💜"],
["soledad","Contigo nunca me siento solo 💜"],
["dudas","Eres mi certeza 💜"],
["oscuridad","Trajiste luz a mi mundo 💜"],
["cansancio","Eres mi descanso 💜"],
["tristeza","Conviertes mis lágrimas en sonrisas 💜"],
["silencio","Tu voz llena mi alma 💜"],
["vacío","Me completas 💜"],
["frío","Tu amor me calienta 💜"],
["perdido","Eres mi camino 💜"],

["tu sonrisa","Tu sonrisa es mi lugar favorito 💜"],
["tus ojos","Tus ojos... son mi universo 💜"],
["tu risa","Tu risa es la música más hermosa 💜"],
["tu voz","Podría escucharte para siempre 💜"],
["tu cabello","Tu cabello baila como mis pensamientos 💜"],
["tu forma","Eres arte en cada detalle 💜"],

["nuestros recuerdos","Quiero más momentos contigo 💜"],
["nuestro futuro","Quiero construirlo contigo 💜"],
["nuestros viajes","Descubrir el mundo contigo 💜"],

["amor","Eres mi definición de amor 💜"],
["vida","Eres mi razón 💜"],
["destino","Te elegiría en todas las vidas 💜"],
["alma","Siento que nuestras almas se conocen 💜"],

["noche","Incluso la noche brilla contigo 💜"],
["luz","Eres mi luz 💜"],
["sueños","Eres mi sueño real 💜"],

["abrazo","Quiero perderme en tus brazos 💜"],
["beso","Cada beso tuyo es magia 💜"],
["cerca","Solo quiero estar cerca de ti 💜"],

["calma","Traes paz a mi mente 💜"],
["locura","Eres mi locura favorita 💜"],
["todo","Eres todo para mí 💜"]
];

/* create thoughts */
thoughts.forEach(t=>{
  let el=document.createElement("div");
  el.className="thought";
  el.innerText=t[0];
  el.style.left=Math.random()*90+"vw";
  el.style.top=Math.random()*80+"vh";

  el.onclick=()=>{
    el.classList.add("activated");
    showMsg(t[1]);
    checkEnd();
  }

  document.body.appendChild(el);
});

function showMsg(text){
  let m=document.getElementById("msg");
  m.innerText=text;
  m.style.opacity=1;
  setTimeout(()=>m.style.opacity=0,3000);
}

/* COUNT */
let activated=0;
function checkEnd(){
  activated++;
  if(activated>15){
    startEnding();
  }
}

/* ENDING */
function startEnding(){
  document.getElementById("music").play();

  let a=document.getElementById("ahmad");
  let r=document.getElementById("ryoko");

  a.style.left="45%";
  r.style.right="45%";

  setTimeout(()=>{
    showFinal();
    createParticles();
    if(navigator.vibrate) navigator.vibrate(200);
  },3000);
}

function showFinal(){
  let f=document.getElementById("final");
  f.style.opacity=1;

  f.innerHTML=`
  <h2>Ryoko 💜</h2>
  <p>Tus ojos… son donde mi mundo encuentra calma.</p>
  <p>Tu cabello… baila como mis pensamientos cuando pienso en ti.</p>
  <p>Tu risa… es la melodía que quiero escuchar toda mi vida.</p>
  <br>
  <p><b>En medio de todo… te encontré.</b></p>
  <p><b>Y contigo… mi mente es un lugar en paz.</b></p>
  <br>
  <h3>Ahmad 💋</h3>
  `;
}

/* PARTICLES */
function createParticles(){
  setInterval(()=>{
    let p=document.createElement("div");
    p.className="particle";
    p.innerText="Ryoko 💜";
    p.style.left=Math.random()*100+"vw";
    p.style.top="100vh";
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),3000);
  },200);
}

</script>

</body>
</html>
